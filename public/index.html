<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrace – Carbon Lifecycle Tracking & Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="particle-bg">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="bg-particles" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="gradient-glow" aria-hidden="true"></div>

    <main class="container">
      <section class="hero">
        <h1>EcoTrace 🌱</h1>
        <p>Making Carbon Data Verifiable & Transparent</p>
        <p class="hero-subtext">Immutable records on Ethereum blockchain</p>
      </section>

      <section class="card form-card">
        <h2>📝 Record Carbon Entry</h2>
        <form id="entryForm" class="entry-form">
          <div class="form-group floating-field">
            <input id="companyName" name="companyName" type="text" placeholder=" " required />
            <label for="companyName">Company Name</label>
          </div>

          <div class="form-group floating-field">
            <input id="productName" name="productName" type="text" placeholder=" " required />
            <label for="productName">Product Name</label>
          </div>

          <div class="form-group floating-field">
            <input
              id="co2Emission"
              name="co2Emission"
              type="number"
              min="0"
              step="0.01"
              placeholder=" "
              required
            />
            <label for="co2Emission">CO2 Emission (kg)</label>
          </div>

          <button type="submit" id="submitButton" class="btn-primary">
            <span class="btn-text">Store & Verify on Blockchain</span>
            <span class="btn-loader" style="display: none;">
              <span class="spinner-inline"></span>
            </span>
          </button>
        </form>

        <div id="toastContainer" class="toast-container"></div>
      </section>

      <section class="stats-section">
        <div class="stat-box stats-card">
          <div class="stat-icon">📊</div>
          <div class="stat-content">
            <span class="stat-label">Total Entries</span>
            <span class="stat-value" id="totalEntries">0</span>
          </div>
        </div>

        <div class="stat-box stats-card">
          <div class="stat-icon">🌍</div>
          <div class="stat-content">
            <span class="stat-label">Total CO2 Tracked</span>
            <div class="stat-value-group">
              <span class="stat-value" id="totalEmissions">0</span>
              <span class="stat-unit">kg</span>
            </div>
          </div>
        </div>

        <div class="stat-box stats-card">
          <div class="stat-icon">⛓️</div>
          <div class="stat-content">
            <span class="stat-label">Blockchain Verified</span>
            <span class="stat-value" id="blockchainCount">0</span>
          </div>
        </div>

        <div class="stat-box stats-card">
          <div class="stat-icon">📈</div>
          <div class="stat-content">
            <span class="stat-label">Avg CO2 Per Entry</span>
            <div class="stat-value-group">
              <span class="stat-value" id="avgEmission">0</span>
              <span class="stat-unit">kg</span>
            </div>
          </div>
        </div>
      </section>

      <section class="card chart-card">
        <div class="chart-header">
          <h2>📈 Emissions Timeline</h2>
          <div class="chart-controls">
            <button id="exportBtn" class="export-btn" title="Export as CSV">📥 Export Data</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="emissionsChart"></canvas>
        </div>
      </section>

      <section class="card dashboard-card">
        <div class="dashboard-header">
          <h2>📋 Recent Records</h2>
          <div class="dashboard-controls">
            <input type="text" id="filterInput" class="filter-input" placeholder="🔍 Search by company or product..." />
            <select id="sortSelect" class="sort-select">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="co2-high">Highest CO2</option>
              <option value="co2-low">Lowest CO2</option>
            </select>
          </div>
        </div>

        <div id="loadingState" class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading records...</p>
        </div>
        <div id="entriesContainer" class="entries-grid"></div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
