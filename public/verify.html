<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrace Verification – Blockchain Verified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-particles" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="container verify-page">
      <section class="card verify-card">
        <div class="verify-header">
          <h1>EcoTrace Verification</h1>
          <p class="verify-subtitle">Blockchain-Verified Record</p>
        </div>

        <div id="verifyLoading" class="loading-spinner">
          <div class="spinner"></div>
          <p>Verifying record...</p>
        </div>

        <p id="verifyError" class="status-message error hidden"></p>

        <div id="verifyContent" class="hidden">
          <div class="verified-badge-large">✔ Verified</div>

          <div class="verify-details">
            <div class="verify-row">
              <span class="verify-label">Product Name</span>
              <strong id="vProduct"></strong>
            </div>
            <div class="verify-row">
              <span class="verify-label">Company Name</span>
              <strong id="vCompany"></strong>
            </div>
            <div class="verify-row">
              <span class="verify-label">CO2 Emission</span>
              <strong id="vEmission"></strong>
            </div>
            <div class="verify-row">
              <span class="verify-label">SHA256 Hash</span>
              <div class="hash-container">
                <code id="vHash" class="hash"></code>
                <button class="copy-btn" id="copyHashBtn" title="Copy hash">📋</button>
              </div>
            </div>
            <div class="verify-row" id="txHashRow" class="hidden">
              <span class="verify-label">Blockchain Tx Hash</span>
              <div class="hash-container">
                <code id="vTxHash" class="hash"></code>
                <button class="copy-btn" id="copyTxBtn" title="Copy tx hash">📋</button>
              </div>
            </div>
            <div class="verify-row">
              <span class="verify-label">Status</span>
              <span class="verified-badge" id="vStatus">Verified</span>
            </div>
          </div>

          <p class="immutable-label">⛓️ Immutable Record – Cannot be Modified</p>
        </div>
      </section>
    </main>

    <script src="verify.js"></script>
  </body>
</html>
